spring.application.name=Commerce
spring.datasource.url=jdbc:mysql://localhost:3306/mor_training?useUnicode=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Flyway configuration
spring.flyway.enabled=true
logging.level.org.flywaydb=DEBUG

# JWT configuration
jwt.secret-key=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS}
jwt.jwtRefreshExpiration=${JWT_REFRESH_EXPIRATION_MS}